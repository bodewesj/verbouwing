<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbouwing Todo</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:10px;
}

h2{text-align:center;}

button{
padding:8px 12px;
margin:5px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.table-wrapper{
overflow-x:auto;
}

table{
border-collapse:collapse;
width:100%;
min-width:900px;
background:white;
}

th,td{
border:1px solid #ccc;
padding:6px;
}

th{background:#eee;}

textarea,select,input{
width:100%;
box-sizing:border-box;
}

textarea{
min-height:26px;
resize:vertical;
}

.status-todo{background:#fff3cd;}
.status-bezig{background:#d1ecf1;}
.status-klaar{background:#d4edda;}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.modal-content{
background:white;
padding:20px;
margin:80px auto;
width:300px;
border-radius:6px;
}

.list-item{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

</style>
</head>

<body>

<h2>Verbouwing Todo</h2>

<div style="text-align:center">

<button onclick="addRow()">Nieuwe taak</button>
<button onclick="downloadCSV()">Download CSV</button>
<button onclick="openOptions()">Opties beheren</button>

</div>

<div class="table-wrapper">

<table id="todoTable">

<thead>

<tr>
<th>Ruimte</th>
<th>Actie</th>
<th>Wie</th>
<th>Afhankelijk van</th>
<th>Hardware</th>
<th>Status</th>
<th>Deadline</th>
<th>Kosten</th>
<th>Notities</th>
<th>Link</th>
<th></th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<!-- OPTIES MODAL -->

<div class="modal" id="optionsModal">

<div class="modal-content">

<h3>Ruimtes</h3>

<div id="ruimteList"></div>

<input id="newRuimte" placeholder="Nieuwe ruimte">
<button onclick="addRuimte()">Toevoegen</button>

<hr>

<h3>Personen</h3>

<div id="nameList"></div>

<input id="newName" placeholder="Nieuwe naam">
<button onclick="addName()">Toevoegen</button>

<br><br>

<button onclick="closeOptions()">Sluiten</button>

</div>

</div>

<script>

let ruimtes=JSON.parse(localStorage.getItem("ruimtes"))||[]
let names=JSON.parse(localStorage.getItem("names"))||["jeroen","ans","jasmijn"]

function saveOptions(){

localStorage.setItem("ruimtes",JSON.stringify(ruimtes))
localStorage.setItem("names",JSON.stringify(names))

}

function createDropdown(list,value){

let select=document.createElement("select")

list.forEach(v=>{

let o=new Option(v,v)
select.add(o)

})

select.value=value||""

select.onchange=saveTable

return select

}

function createTextarea(val=""){

let t=document.createElement("textarea")

t.value=val

t.oninput=function(){

this.style.height="auto"
this.style.height=this.scrollHeight+"px"

saveTable()

}

return t

}

function addRow(data={}){

let tbody=document.querySelector("#todoTable tbody")

let row=tbody.insertRow()

let ruimte=row.insertCell()
ruimte.appendChild(createDropdown(ruimtes,data.ruimte))

let actie=row.insertCell()
actie.appendChild(createTextarea(data.actie))

let wie=row.insertCell()
wie.appendChild(createDropdown(names,data.wie))

let afh=row.insertCell()
afh.appendChild(createTextarea(data.afhankelijk))

let hw=row.insertCell()

let cb=document.createElement("input")
cb.type="checkbox"
cb.checked=data.hardware||false
cb.onchange=saveTable

hw.appendChild(cb)

let status=row.insertCell()

let s=document.createElement("select")

;["todo","bezig","klaar"].forEach(v=>{

s.add(new Option(v,v))

})

s.value=data.status||"todo"

row.classList.add("status-"+s.value)

s.onchange=function(){

row.classList.remove("status-todo","status-bezig","status-klaar")
row.classList.add("status-"+this.value)

saveTable()

}

status.appendChild(s)

let dl=row.insertCell()

let date=document.createElement("input")
date.type="date"
date.value=data.deadline||""
date.onchange=saveTable

dl.appendChild(date)

let kosten=row.insertCell()
kosten.appendChild(createTextarea(data.kosten))

let not=row.insertCell()
not.appendChild(createTextarea(data.notities))

let link=row.insertCell()
link.appendChild(createTextarea(data.link))

let act=row.insertCell()

let del=document.createElement("button")
del.innerText="X"
del.onclick=function(){

row.remove()
saveTable()

}

act.appendChild(del)

saveTable()

}

function saveTable(){

let rows=document.querySelectorAll("#todoTable tbody tr")

let data=[]

rows.forEach(r=>{

let c=r.cells

data.push({

ruimte:c[0].querySelector("select").value,
actie:c[1].firstChild.value,
wie:c[2].querySelector("select").value,
afhankelijk:c[3].firstChild.value,
hardware:c[4].firstChild.checked,
status:c[5].firstChild.value,
deadline:c[6].firstChild.value,
kosten:c[7].firstChild.value,
notities:c[8].firstChild.value,
link:c[9].firstChild.value

})

})

localStorage.setItem("verbouwingTodo",JSON.stringify(data))

}

function loadTable(){

let data=JSON.parse(localStorage.getItem("verbouwingTodo"))||[]

data.forEach(d=>addRow(d))

}

function downloadCSV(){

let rows=document.querySelectorAll("#todoTable tr")

let csv=[]

rows.forEach(r=>{

let cols=r.querySelectorAll("th,td")

let row=[]

cols.forEach((c,i)=>{

if(i===4){

let checkbox=c.querySelector("input")

row.push(checkbox && checkbox.checked?"ja":"nee")

}

else{

let input=c.querySelector("input,select,textarea")

row.push(input?input.value:c.innerText)

}

})

csv.push(row.join(","))

})

let blob=new Blob([csv.join("\n")],{type:"text/csv"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="verbouwing_todo.csv"

a.click()

}

function openOptions(){

document.getElementById("optionsModal").style.display="block"

renderOptionLists()

}

function closeOptions(){

document.getElementById("optionsModal").style.display="none"

saveOptions()

}

function renderOptionLists(){

let r=document.getElementById("ruimteList")
r.innerHTML=""

ruimtes.forEach((v,i)=>{

let d=document.createElement("div")
d.className="list-item"

d.innerHTML=v+" <button onclick='deleteRuimte("+i+")'>X</button>"

r.appendChild(d)

})

let n=document.getElementById("nameList")
n.innerHTML=""

names.forEach((v,i)=>{

let d=document.createElement("div")
d.className="list-item"

d.innerHTML=v+" <button onclick='deleteName("+i+")'>X</button>"

n.appendChild(d)

})

}

function addRuimte(){

let v=document.getElementById("newRuimte").value

if(v){

ruimtes.push(v)

document.getElementById("newRuimte").value=""

renderOptionLists()

saveOptions()

}

}

function addName(){

let v=document.getElementById("newName").value

if(v){

names.push(v)

document.getElementById("newName").value=""

renderOptionLists()

saveOptions()

}

}

function deleteRuimte(i){

ruimtes.splice(i,1)

renderOptionLists()

saveOptions()

}

function deleteName(i){

names.splice(i,1)

renderOptionLists()

saveOptions()

}

loadTable()

</script>

</body>
</html>
