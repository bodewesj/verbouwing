<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verbouwing Todo</title>

<style>

body{
font-family:Arial;
margin:40px;
}

table{
border-collapse:collapse;
width:100%;
}

th,td{
border:1px solid #ccc;
padding:6px;
font-size:14px;
}

input,select{
width:100%;
box-sizing:border-box;
}

button{
margin:2px;
}

</style>
</head>

<body>

<h2>Verbouwing Todo</h2>

<button onclick="addRow()">Nieuwe taak</button>
<button onclick="downloadCSV()">Download CSV</button>

<br><br>

<table id="todoTable">

<thead>
<tr>
<th>Ruimte</th>
<th>Prio</th>
<th>Actie</th>
<th>Wie</th>
<th>Afhankelijk van</th>
<th>Hardware</th>
<th>Status</th>
<th>Deadline</th>
<th>Kosten</th>
<th>Notities</th>
<th>Link</th>
<th>Acties</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

let names = ["jeroen","ans","jasmijn"];

function createNameDropdown(value=""){

let select=document.createElement("select");

names.forEach(n=>{
let o=document.createElement("option");
o.text=n;
select.add(o);
});

let add=document.createElement("option");
add.text="Nieuwe naam...";
select.add(add);

if(value) select.value=value;

select.onchange=function(){

if(this.value==="Nieuwe naam..."){

let newName=prompt("Nieuwe naam:");

if(newName){

names.push(newName);

let o=document.createElement("option");
o.text=newName;

this.add(o,this.options.length-1);

this.value=newName;

saveTable();
}

}

saveTable();

};

return select;

}

function createStatusDropdown(value="todo"){

let select=document.createElement("select");

["todo","bezig","klaar"].forEach(s=>{
let o=document.createElement("option");
o.text=s;
select.add(o);
});

select.value=value;

select.onchange=saveTable;

return select;

}

function addRow(data={}){

let table=document.querySelector("#todoTable tbody");

let row=table.insertRow();

function textCell(val=""){
let cell=row.insertCell();
let input=document.createElement("input");
input.value=val;
input.onchange=saveTable;
cell.appendChild(input);
}

textCell(data.ruimte);
textCell(data.prio);
textCell(data.actie);

let nameCell=row.insertCell();
nameCell.appendChild(createNameDropdown(data.wie));

textCell(data.afhankelijk);

let hw=row.insertCell();
let checkbox=document.createElement("input");
checkbox.type="checkbox";
checkbox.checked=data.hardware||false;
checkbox.onchange=saveTable;
hw.appendChild(checkbox);

let status=row.insertCell();
status.appendChild(createStatusDropdown(data.status));

let deadline=row.insertCell();
let date=document.createElement("input");
date.type="date";
date.value=data.deadline||"";
date.onchange=saveTable;
deadline.appendChild(date);

textCell(data.kosten);
textCell(data.notities);
textCell(data.link);

let actions=row.insertCell();

let up=document.createElement("button");
up.innerText="↑";
up.onclick=()=>moveRow(row,-1);

let down=document.createElement("button");
down.innerText="↓";
down.onclick=()=>moveRow(row,1);

let del=document.createElement("button");
del.innerText="X";
del.onclick=()=>{row.remove();saveTable();};

actions.appendChild(up);
actions.appendChild(down);
actions.appendChild(del);

saveTable();

}

function moveRow(row,dir){

let table=row.parentNode;

let index=row.rowIndex-1;

let newIndex=index+dir;

if(newIndex<0||newIndex>=table.rows.length) return;

table.insertBefore(row,table.rows[newIndex]);

saveTable();

}

function saveTable(){

let rows=document.querySelectorAll("#todoTable tbody tr");

let data=[];

rows.forEach(r=>{

let cells=r.cells;

data.push({

ruimte:cells[0].firstChild.value,
prio:cells[1].firstChild.value,
actie:cells[2].firstChild.value,
wie:cells[3].firstChild.value,
afhankelijk:cells[4].firstChild.value,
hardware:cells[5].firstChild.checked,
status:cells[6].firstChild.value,
deadline:cells[7].firstChild.value,
kosten:cells[8].firstChild.value,
notities:cells[9].firstChild.value,
link:cells[10].firstChild.value

});

});

localStorage.setItem("verbouwingTodo",JSON.stringify(data));

}

function loadTable(){

let data=localStorage.getItem("verbouwingTodo");

if(!data) return;

JSON.parse(data).forEach(d=>addRow(d));

}

function downloadCSV(){

let rows=document.querySelectorAll("#todoTable tr");

let csv=[];

rows.forEach(r=>{

let cols=r.querySelectorAll("th,td");

let row=[];

cols.forEach((c,i)=>{

if(i==5){
row.push(c.querySelector("input")?.checked?"ja":"nee");
}
else{
row.push(c.innerText||c.querySelector("input,select")?.value||"");
}

});

csv.push(row.join(","));

});

let blob=new Blob([csv.join("\n")],{type:"text/csv"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="verbouwing_todo.csv";

a.click();

}

loadTable();

</script>

</body>
</html>
