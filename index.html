<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbouwing Todo</title>
<style>
body{font-family:Arial;margin:10px;background:#f5f5f5;}
h2{text-align:center;color:#333;}
button{margin:4px 2px;padding:8px 12px;font-size:14px;border:none;background:#007bff;color:white;border-radius:5px;cursor:pointer;}
button:hover{background:#0056b3;}
.table-wrapper{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{border-collapse:collapse;width:100%;min-width:900px;background:white;}
th,td{border:1px solid #ccc;padding:6px;font-size:14px;text-align:left;position:relative;}
input,select{width:100%;box-sizing:border-box;padding:4px;font-size:14px;}
th{background:#eee;cursor:col-resize;}
.status-todo{background:#fff3cd;}
.status-bezig{background:#d1ecf1;}
.status-klaar{background:#d4edda;}
.actions button{padding:4px 6px;margin:2px 0;font-size:12px;}
tr.dragging{opacity:0.5;}
</style>
</head>
<body>

<h2>Verbouwing Todo</h2>
<div style="text-align:center;">
<button id="btnAdd">Nieuwe taak</button>
<button id="btnCSV">Download CSV</button>
</div>
<br>
<div class="table-wrapper">
<table id="todoTable">
<thead>
<tr>
<th>Ruimte</th>
<th>Actie</th>
<th>Wie</th>
<th>Afhankelijk van</th>
<th>Hardware</th>
<th>Status</th>
<th>Deadline</th>
<th>Kosten</th>
<th>Notities</th>
<th>Link</th>
<th>Acties</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
document.addEventListener("DOMContentLoaded",function(){
let names=["jeroen","ans","jasmijn"];
let ruimtes=[];

// dynamische dropdown met “Nieuw item…” prompt
function createDropdown(list,row,value){
  let select=document.createElement("select");
  list.forEach(v=>{ let o=document.createElement("option"); o.text=v; select.add(o); });
  let add=document.createElement("option"); add.text="Nieuw item..."; select.add(add);
  if(value) select.value=value;
  select.addEventListener("change",function(){
    if(this.value==="Nieuw item..."){
      let newItem=prompt("Nieuwe invoer:");
      if(newItem){
        list.push(newItem);
        this.add(new Option(newItem,this.options.length-1));
        this.value=newItem;
        updateAllDropdowns(list, this);
      } else { this.value = ""; }
    }
    saveTable();
  });
  return select;
}

// update alle dropdowns
function updateAllDropdowns(list, currentSelect){
  document.querySelectorAll("#todoTable tbody tr").forEach(tr=>{
    tr.querySelectorAll("td select").forEach(sel=>{
      if(sel!==currentSelect && list.includes(sel.value)){
        if(!Array.from(sel.options).some(o=>o.value===sel.value)){
          sel.add(new Option(sel.value,sel.options.length-1));
        }
      }
    });
  });
}

function createStatusDropdown(row,value="todo"){
  let select=document.createElement("select");
  ["todo","bezig","klaar"].forEach(s=>{ let o=document.createElement("option"); o.text=s; select.add(o); });
  select.value=value;
  select.onchange=function(){
    row.classList.remove("status-todo","status-bezig","status-klaar");
    row.classList.add("status-"+this.value);
    saveTable();
  };
  return select;
}

function createTextCell(row,val=""){
  let cell=row.insertCell();
  let input=document.createElement("input"); input.value=val; input.onchange=saveTable;
  cell.appendChild(input);
}

function addRow(data={}){
  let table=document.querySelector("#todoTable tbody");
  let row=table.insertRow();
  row.draggable=true;

  // RUIMTE dropdown
  let cell=row.insertCell();
  let ruimteSelect=createDropdown(ruimtes,row,data.ruimte||"");
  cell.appendChild(ruimteSelect);
  if(data.ruimte && !ruimtes.includes(data.ruimte)) ruimtes.push(data.ruimte);

  // Actie
  createTextCell(row,data.actie);

  // WIE dropdown
  let cellWie=row.insertCell();
  let nameSelect=createDropdown(names,row,data.wie||"");
  cellWie.appendChild(nameSelect);

  createTextCell(row,data.afhankelijk);

  // Hardware checkbox
  let hw=row.insertCell();
  let checkbox=document.createElement("input"); checkbox.type="checkbox"; checkbox.checked=data.hardware||false; checkbox.onchange=saveTable; hw.appendChild(checkbox);

  // Status
  let status=row.insertCell();
  let statusDropdown=createStatusDropdown(row,data.status||"todo");
  status.appendChild(statusDropdown);
  row.classList.add("status-"+(data.status||"todo"));
