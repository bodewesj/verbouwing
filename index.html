<html lang="nl">
<head>

<title>Verbouwing Todo</title>
<style>
body{

}
button{
  margin: 4px 2px;

th,td{

}
.status-todo{ background:#fff3cd; }

.status-klaar{ background:#d4edda; }
.actions button{

  font-size: 12px;
}
</style>
</head>
