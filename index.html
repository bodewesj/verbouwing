<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbouwing Todo</title>

<style>
body{
font-family:Arial;
margin:10px;
background:#f4f4f4;
}

h2{
text-align:center;
}

button{
padding:8px 14px;
margin:5px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.table-wrapper{
overflow-x:auto;
}

table{
border-collapse:collapse;
width:100%;
min-width:900px;
background:white;
}

th,td{
border:1px solid #ccc;
padding:6px;
}

th{
background:#eee;
cursor:col-resize;
}

textarea,select,input{
width:100%;
box-sizing:border-box;
font-size:14px;
}

textarea{
resize:vertical;
min-height:26px;
}

.status-todo{
background:#fff3cd;
}

.status-bezig{
background:#d1ecf1;
}

.status-klaar{
background:#d4edda;
}

tr.dragging{
opacity:0.4;
}

.actions button{
font-size:12px;
padding:4px 6px;
}
</style>

</head>
<body>

<h2>Verbouwing Todo</h2>

<div style="text-align:center;">
<button onclick="addRow()">Nieuwe taak</button>
<button onclick="downloadCSV()">Download CSV</button>
</div>

<div class="table-wrapper">
<table id="todoTable">

<thead>
<tr>
<th>Ruimte</th>
<th>Actie</th>
<th>Wie</th>
<th>Afhankelijk van</th>
<th>Hardware</th>
<th>Status</th>
<th>Deadline</th>
<th>Kosten</th>
<th>Notities</th>
<th>Link</th>
<th>Acties</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

<script>

let ruimtes=[]
let names=["jeroen","ans","jasmijn"]



function createDropdown(list,value){

let select=document.createElement("select")

list.forEach(v=>{
let o=document.createElement("option")
o.text=v
o.value=v
select.add(o)
})

let add=document.createElement("option")
add.text="Nieuw item..."
add.value="nieuw"
select.add(add)

select.value=value||""

select.onchange=function(){

if(this.value==="nieuw"){

let n=prompt("Nieuwe invoer")

if(n){

list.push(n)

let o=new Option(n,n)
this.add(o)

this.value=n

updateAllDropdowns()

}

}

saveTable()

}

return select
}



function updateAllDropdowns(){

document.querySelectorAll("#todoTable tbody tr").forEach(r=>{

let ruimte=r.cells[0].querySelector("select")
let wie=r.cells[2].querySelector("select")

ruimtes.forEach(v=>{
if(![...ruimte.options].some(o=>o.value===v)){
ruimte.add(new Option(v,v))
}
})

names.forEach(v=>{
if(![...wie.options].some(o=>o.value===v)){
wie.add(new Option(v,v))
}
})

})

}



function createTextarea(val=""){

let t=document.createElement("textarea")

t.value=val

t.oninput=function(){

this.style.height="auto"
this.style.height=this.scrollHeight+"px"

saveTable()

}

return t

}



function addRow(data={}){

let tbody=document.querySelector("#todoTable tbody")

let row=tbody.insertRow()

row.draggable=true



if(data.ruimte && !ruimtes.includes(data.ruimte)){
ruimtes.push(data.ruimte)
}



let ruimte=row.insertCell()

ruimte.appendChild(createDropdown(ruimtes,data.ruimte))



let actie=row.insertCell()

actie.appendChild(createTextarea(data.actie))



if(data.wie && !names.includes(data.wie)){
names.push(data.wie)
}

let wie=row.insertCell()

wie.appendChild(createDropdown(names,data.wie))



let afh=row.insertCell()

afh.appendChild(createTextarea(data.afhankelijk))



let hw=row.insertCell()

let cb=document.createElement("input")

cb.type="checkbox"
cb.checked=data.hardware||false
cb.onchange=saveTable

hw.appendChild(cb)



let status=row.insertCell()

let s=document.createElement("select")

;["todo","bezig","klaar"].forEach(v=>{
let o=new Option(v,v)
s.add(o)
})

s.value=data.status||"todo"

row.classList.add("status-"+s.value)

s.onchange=function(){

row.classList.remove("status-todo","status-bezig","status-klaar")
row.classList.add("status-"+this.value)

saveTable()

}

status.appendChild(s)



let dl=row.insertCell()

let date=document.createElement("input")

date.type="date"
date.value=data.deadline||""
date.onchange=saveTable

dl.appendChild(date)



let kosten=row.insertCell()

kosten.appendChild(createTextarea(data.kosten))



let not=row.insertCell()

not.appendChild(createTextarea(data.notities))



let link=row.insertCell()

link.appendChild(createTextarea(data.link))



let act=row.insertCell()

act.className="actions"

let del=document.createElement("button")

del.innerText="X"

del.onclick=function(){

row.remove()
saveTable()

}

act.appendChild(del)



row.addEventListener("dragstart",e=>{
row.classList.add("dragging")
e.dataTransfer.setData("text/plain","drag")
})

row.addEventListener("dragend",e=>{
row.classList.remove("dragging")
saveTable()
})

row.addEventListener("dragover",e=>{
e.preventDefault()
})

row.addEventListener("drop",e=>{

e.preventDefault()

let dragging=document.querySelector(".dragging")

if(dragging!==row){

tbody.insertBefore(dragging,row)

}

})

saveTable()

}



function saveTable(){

let rows=document.querySelectorAll("#todoTable tbody tr")

let data=[]

rows.forEach(r=>{

let c=r.cells

data.push({

ruimte:c[0].querySelector("select").value,

actie:c[1].firstChild.value,

wie:c[2].querySelector("select").value,

afhankelijk:c[3].firstChild.value,

hardware:c[4].firstChild.checked,

status:c[5].firstChild.value,

deadline:c[6].firstChild.value,

kosten:c[7].firstChild.value,

notities:c[8].firstChild.value,

link:c[9].firstChild.value

})

})

localStorage.setItem("verbouwingTodo",JSON.stringify(data))

}



function loadTable(){

let data=localStorage.getItem("verbouwingTodo")

if(!data) return

JSON.parse(data).forEach(d=>addRow(d))

}



function downloadCSV(){

let rows=document.querySelectorAll("#todoTable tr")

let csv=[]

rows.forEach(r=>{

let cols=r.querySelectorAll("th,td")

let row=[]

cols.forEach((c,i)=>{

if(i===4){

let checkbox=c.querySelector("input")

row.push(checkbox && checkbox.checked?"ja":"nee")

}

else{

let input=c.querySelector("input,select,textarea")

row.push(input?input.value:c.innerText)

}

})

csv.push(row.join(","))

})

let blob=new Blob([csv.join("\n")],{type:"text/csv"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="verbouwing_todo.csv"

a.click()

}



loadTable()

</script>

</body>
</html>
