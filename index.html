<html lang="nl">

<title>Verbouwing Todo</title>
<style>
body{
  font-family: Arial, sans-serif;
  margin: 10px;
  background: #f5f5f5;
}

h2{
  text-align: center;
  color: #333;
}

button{
  margin: 4px 2px;
  padding: 8px 12px;
  font-size: 14px;
  border: none;
  background-color: #007bff;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
button:hover{
  background-color: #0056b3;
}

table{
  border-collapse: collapse;
  width: 100%;
  background: white;
  min-width: 800px; /* scroll op mobiel */
}

th,td{
  border: 1px solid #ccc;
  padding: 6px;
  font-size: 14px;
  text-align: left;
}

input, select{
  width: 100%;
  box-sizing: border-box;
  padding: 4px;
  font-size: 14px;
}

th{
  background: #eee;
}

.status-todo{
  background-color: #fff3cd;
}
.status-bezig{
  background-color: #d1ecf1;
}
.status-klaar{
  background-color: #d4edda;
}

/* scrollable table on mobile */
.table-wrapper{
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.actions button{
  padding: 4px 6px;
  margin: 2px 0;
  font-size: 12px;
}
</style>
</head>
